# - script: | 
#     kubeseal < dev-secret.yaml --cert cert.pem -o yaml > helm/my-app/backend/sealedsecret-dev.yaml
#     kubeseal < stage-secret.yaml --cert cert.pem -o yaml > helm/my-app/backend/sealedsecret-stage.yaml
#     kubeseal < prod-secret.yaml --cert cert.pem -o yaml > helm/my-app/backend/sealedsecret-prod.yaml
#   displayName: 'Seal secret'

- script: | 
    echo '{
      "apiVersion": "v1",
      "kind": "Secret",
      "metadata": {
        "name": "redis-secret"
      },
      "type": "Opaque",
      "data": {
        "REDIS_PASS": "$(DEV_REDIS_SECRET)"
      }
    }' > dev-secret.json


    echo '{
      "apiVersion": "v1",
      "kind": "Secret",
      "metadata": {
        "name": "redis-secret"
      },
      "type": "Opaque",
      "data": {
        "REDIS_PASS": "$(STAGE_REDIS_SECRET)"
      }
    }' > stage-secret.json

    echo '{
      "apiVersion": "v1",
      "kind": "Secret",
      "metadata": {
        "name": "redis-secret"
      },
      "type": "Opaque",
      "data": {
        "REDIS_PASS": "$(PROD_REDIS_SECRET)"
      }
    }' > prod-secret.json
  displayName: 'Create secret jsons for reference'


- script: | 
    kubeseal < dev-secret.json --cert cert.pem > dev-sealed-secret.json 
    kubeseal < stage-secret.json --cert cert.pem > stage-sealed-secret.json 
    kubeseal < prod-secret.json --cert cert.pem > prod-sealed-secret.json 
  displayName: 'Encrypt the json secrets with Kubeseal'

- script: | 
    cat dev-sealed-secret.json | jq -r '.spec.encryptedData.REDIS_PASS' > dev-redis-pass.txt
    cat stage-sealed-secret.json | jq -r '.spec.encryptedData.REDIS_PASS' > stage-redis-pass.txt
    cat prod-sealed-secret.json | jq -r '.spec.encryptedData.REDIS_PASS' > prod-redis-pass.txt
  displayName: 'Get the value of REDIS_PASS'

- script: | # ESTO HAY Q MODIFICAR EL SED POR LAS "/" DENTRO DEL ENCRYPTED STRING ROMPEN EL SED
    sed -i "s/redis_pass:.*/redis_pass: $(cat dev-redis-pass.txt | tr -d '\n') # This value was modified by the sealed-secrets pipeline/g" helm/my-app/backend/environments/values-dev.yaml    
    sed -i "s/redis_pass:.*/redis_pass: $(cat stage-redis-pass.txt | tr -d '\n') # This value was modified by the sealed-secrets pipeline/g" helm/my-app/backend/environments/values-stage.yaml    
    sed -i "s/redis_pass:.*/redis_pass: $(cat prod-redis-pass.txt | tr -d '\n') # This value was modified by the sealed-secrets pipeline/g" helm/my-app/backend/environments/values-prod.yaml    
  displayName: 'Comment old secret'

