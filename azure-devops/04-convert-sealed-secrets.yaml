- script: |
    git pull origin main
    git config --global user.email "AzureDevOps@SealedSecretPipeline.com"
    git config --global user.name "Azure DevOps - Sealed Secret Pipeline"
    git checkout -b main
    git add helm/my-app/backend/templates/redis-secret.yaml 
    git add helm/my-app/backend/sealedsecret-dev.yaml 
    git add helm/my-app/backend/sealedsecret-stage.yaml 
    git add helm/my-app/backend/sealedsecret-prod.yaml
    git commit -m "Sealed secrets created by Azure DevOps"
    git push --set-upstream origin main
  displayName: 'Push changes to GitHub'



