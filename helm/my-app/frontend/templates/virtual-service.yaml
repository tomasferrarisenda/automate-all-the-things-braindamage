{{- if eq .Values.environment "dev" }} # Deploy only in dev environment
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-virtual-service
spec:
  gateways:
    - {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-gateway
  hosts:
    - a0affdbe14747400992c06aaa814c0d7-528836119.us-east-2.elb.amazonaws.com
    - {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-deployment
  http:
    - match:
        - uri:
            prefix: /dev/
      rewrite:
        uri: /
      route:
        - destination:
            host: {{ .Values.appName }}-{{ .Values.service }}-{{ .Values.environment }}-service
          # weight: 100
{{- end }}
